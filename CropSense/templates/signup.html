{% extends "base.html" %}
{% block title %}CropSense — Sign Up{% endblock %}
{% block content %}

<div class="page-header">
    <h1>Create Account</h1>
    <p>Sign up to start using CropSense</p>
</div>

{% if error %}
<div class="alert alert-error">⚠️ {{ error }}</div>
{% endif %}

<div class="form-card">
    <form method="POST" action="{{ url_for('signup') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Choose a password" required>
        </div>
        <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" name="confirm" placeholder="Repeat your password" required>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </div>
        <p style="text-align:center; margin-top:16px; color:#666; font-size:0.9rem;">
            Already have an account? 
            <a href="{{ url_for('login') }}" style="color:#2e7d32; font-weight:600;">Login</a>
        </p>
    </form>
</div>

{% endblock %}
