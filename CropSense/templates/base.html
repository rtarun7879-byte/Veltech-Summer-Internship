<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CropSense — AI Crop Advisor{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">🌾 CropSense</div>
    <div class="nav-links">
    <a href="{{ url_for('home') }}" class="nav-link {% if request.endpoint=='home' %}active{% endif %}">Home</a>
    <a href="{{ url_for('predict') }}" class="nav-link {% if request.endpoint=='predict' %}active{% endif %}">Predict</a>
    <a href="{{ url_for('records') }}" class="nav-link {% if request.endpoint=='records' %}active{% endif %}">Records</a>
    <a href="{{ url_for('about') }}" class="nav-link {% if request.endpoint=='about' %}active{% endif %}">About</a>
    {% if session.get('user') %}
    <a href="{{ url_for('logout') }}" class="nav-link nav-logout">🚪 Logout ({{ session['user'] }})</a>
    {% endif %}
</div>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
</nav>

<main class="main-content">
    {% block content %}{% endblock %}
</main>

<footer class="footer">
    <p>CropSense &copy; 2026 &nbsp;·&nbsp; Powered by Random Forest ML &nbsp;·&nbsp; Built with Flask</p>
</footer>

</body>
</html>
